<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextern AI - Live Test</title>

    <!-- Bootstrap CSS for a clean, responsive layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- n8n Chat Widget CSS -->
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Simple Navbar -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">Nextern Prototype</span>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h2 class="fw-bold text-dark mb-4">Webhook Test Environment</h2>
                <p class="lead text-secondary mb-4">
                    This page is connected directly to your production webhook.
                    Click the chat bubble in the bottom right corner to initialize the connection.
                </p>

                <!-- Webhook Display Alert -->
                <div class="alert alert-info border-0 shadow-sm text-break" role="alert">
                    <strong>Connected Endpoint:</strong><br>
                    <code>https://n8ngc.codeblazar.org/webhook/06a099aa-3f20-4d1a-b851-aa139180ce4e/chat</code>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- n8n Chat Widget Initialization -->
    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

        createChat({
            webhookUrl: 'https://n8ngc.codeblazar.org/webhook/06a099aa-3f20-4d1a-b851-aa139180ce4e/chat',
            mode: 'window',
            chatInputPlaceholder: 'Type your message...',
            title: 'Nextern Assistant',
            subtitle: 'Live Production Webhook',
            showWelcomeScreen: false,
            initialMessages: [
                'Hello! The frontend is successfully communicating with the n8n backend. How can I help?'
            ]
        });
    </script>
</body>

</html>
